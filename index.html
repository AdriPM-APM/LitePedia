<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LitePedia</title>
    <style>
        :root { --bg: #ffffff; --text: #202122; --border: #a2a9b1; --header: #f8f9fa; }
        body.dark-mode { --bg: #121212; --text: #e0e0e0; --border: #444; --header: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }

        /* Search Section */
        .search-container { border: 1px solid var(--border); padding: 20px; border-radius: 8px; background: var(--header); display: flex; align-items: flex-end; gap: 15px; justify-content: center; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 12px; font-weight: bold; }
        
        #search-input, select, button { padding: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        button { cursor: pointer; background: #e8ecef; }
        
        .ad-container { position: fixed; bottom: 20px; right: 20px; width: 300px; }
    </style>
</head>
<body>

<div class="search-container">
    <div class="field">
        <label>Search</label>
        <input type="text" id="search-input" placeholder="Buscar artículo...">
    </div>
    
    <div class="field">
        <label>Source Wikipedia</label>
        <select id="source-lang-select">
            <option value="en" selected>English</option>
            <option value="es">Español</option>
            <option value="ca">Català</option>
        </select>
    </div>

    <div class="field">
        <label>Output Language</label>
        <select id="output-lang-select">
            <option value="en">English</option>
            <option value="es" selected>Español</option>
            <option value="ca">Català</option>
        </select>
    </div>

    <button onclick="executeSearch()">Search</button>
</div>

<!-- AI Result Placeholder -->
<div id="result-display" style="margin-top: 20px;"></div>

<!-- Ad Placeholder -->
<div class="ad-container">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3556713788542025" crossorigin="anonymous"></script>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3556713788542025" data-ad-slot="2168826316" data-ad-format="auto"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
    async function executeSearch() {
        const query = document.getElementById('search-input').value;
        const source = document.getElementById('source-lang-select').value;
        const target = document.getElementById('output-lang-select').value;
        const display = document.getElementById('result-display');

        if (!query) return alert("Please enter a search term");

        display.innerText = "Searching and loading AI...";

        try {
            // 1. Fetch Wikipedia
            const wikiUrl = `https://${source}.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`;
            const wikiRes = await fetch(wikiUrl);
            const wikiData = await wikiRes.json();
            const page = Object.values(wikiData.query.pages)[0];
            
            if (!page.extract) throw new Error("No content found");

            display.innerText = "AI is summarizing...";

            // 2. Fetch AI (This is where your proxy call goes)
            const aiRes = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "google/gemma-4-26b-a4b-it:free",
                    messages: [
                        { role: "system", content: `Translate and summarize into ${target}.` },
                        { role: "user", content: page.extract.substring(0, 2000) }
                    ]
                })
            });

            const aiData = await aiRes.json();
            display.innerText = aiData.choices[0].message.content;

        } catch (err) {
            display.innerText = "Error: " + err.message;
        }
    }
</script>

</body>
</html>
