<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LitePedia - AI</title>
    <style>
        :root { --bg: #ffffff; --text: #202122; --border: #a2a9b1; --accent: #3366cc; }
        body.dark-mode { --bg: #121212; --text: #e0e0e0; --border: #444; --accent: #6699ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }

        /* Contenedor de opciones (siempre visibles) */
        .header-controls { display: flex; gap: 20px; justify-content: center; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; padding: 10px; background: var(--header-bg); border-bottom: 1px solid var(--border); }
        .control-group { display: flex; flex-direction: column; gap: 5px; min-width: 150px; }
        .control-group label { font-size: 11px; font-weight: bold; text-transform: uppercase; }
        select, button { padding: 8px; cursor: pointer; }

        /* Área de búsqueda */
        .search-container { position: relative; max-width: 600px; margin: 0 auto 30px; }
        #search-input { width: 100%; padding: 12px; border: 1px solid var(--border); box-sizing: border-box; }
        
        /* Resultados IA */
        #ai-output { max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; border: 1px solid var(--border); border-radius: 8px; }
        
        /* Formato de texto IA */
        #ai-output b { font-weight: bold; color: var(--accent); }
        #ai-output u { text-decoration: underline; }
        #ai-output i { font-style: italic; }
        #ai-output { white-space: pre-wrap; }

        .theme-toggle { position: fixed; top: 10px; right: 10px; z-index: 3000; }
        .ad-container { position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 1000; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div class="header-controls">
    <div class="control-group">
        <label>Source Wikipedia</label>
        <select id="source-lang-select">
            <option value="en">English</option>
            <option value="es" selected>Español</option>
            <option value="ca">Català</option>
        </select>
    </div>
    <div class="control-group">
        <label>Output Language</label>
        <select id="output-lang-select">
            <option value="en">English</option>
            <option value="es" selected>Español</option>
        </select>
    </div>
    <button onclick="executeSearch()">Search</button>
</div>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Buscar término..." autocomplete="off">
</div>

<div id="ai-output" style="display:none;"></div>

<div class="ad-container">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3556713788542025" crossorigin="anonymous"></script>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3556713788542025" data-ad-slot="2168826316" data-ad-format="auto"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
    // Función para convertir Markdown (IA) a HTML
    // Esta función convierte los símbolos de la IA en etiquetas HTML
function parseMarkdown(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // Convierte **texto** en <b>texto</b>
        .replace(/__(.*?)__/g, '<u>$1</u>')    // Convierte __texto__ en <u>texto</u>
        .replace(/\*(.*?)\*/g, '<i>$1</i>')    // Convierte *texto* en <i>texto</i>
        .replace(/\n/g, '<br>');               // Convierte los saltos de línea
}

// Así debes usarla dentro de executeSearch()
const aiData = await aiRes.json();
const rawText = aiData.choices[0].message.content;

// Aplicamos el formato antes de mostrarlo
document.getElementById('ai-output').innerHTML = parseMarkdown(rawText);

    async function executeSearch() {
        const query = document.getElementById('search-input').value;
        const source = document.getElementById('source-lang-select').value;
        const target = document.getElementById('output-lang-select').value;
        const output = document.getElementById('ai-output');

        if (!query) return alert("Escribe un término");

        output.style.display = 'block';
        output.innerHTML = "<i>Consultando Wikipedia...</i>";

        try {
            // Wikipedia Fetch
            const wikiUrl = `https://${source}.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`;
            const wikiRes = await fetch(wikiUrl);
            const wikiData = await wikiRes.json();
            const page = Object.values(wikiData.query.pages)[0];

            if (!page.extract) throw new Error("Artículo no encontrado.");

            output.innerHTML = "<i>La IA está redactando con formato...</i>";

            // AI Proxy
            const aiRes = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": "google/gemma-4-26b-a4b-it:free",
                    // ... dentro de tu JSON body ...
                    "messages": [
                        { 
                            "role": "system", 
                            "content": "Eres un asistente técnico. Responde en el idioma solicitado. Usa SIEMPRE este formato para resaltar: **negrita** para conceptos clave, *cursiva* para términos técnicos y __subrayado__ para advertencias de seguridad." 
                        },
                        { "role": "user", "content": "..." }
                    ]    

            const aiData = await aiRes.json();
            // Aplicamos el parseo de Markdown aquí
            output.innerHTML = parseMarkdown(aiData.choices[0].message.content);
            
        } catch (e) {
            output.innerHTML = "Error: " + e.message;
        }
    }

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
