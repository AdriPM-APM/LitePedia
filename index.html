<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LitePedia</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        
        /* Definición de Colores (Temas) */
        :root {
            --bg-color: #ffffff;
            --text-color: #202122;
            --header-bg: #f8f9fa;
            --border-color: #a2a9b1;
            --link-blue: #3366cc;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1e1e1e;
            --border-color: #444;
            --link-blue: #6699ff;
        }

        body { 
            font-family: 'Linux Libertine', 'Georgia', serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        
        .container { width: 100%; max-width: 800px; padding: 2rem; }
        
        /* Tema y Controles */
        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; padding: 5px 10px; background: var(--header-bg); border: 1px solid var(--border-color); color: var(--text-color); }

        #home-view { text-align: center; margin-top: 50px; }
        .wiki-header h1 { font-family: 'Playfair Display', serif; font-size: 60px; text-transform: uppercase; margin: 0; }
        
        .search-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; background: var(--header-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        
        input, select, button { background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px; }
        button { cursor: pointer; }

        /* Anuncio Posicionado (Esquina inferior derecha) */
        .ad-container { position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 1000; }

        #reader-view { display: none; text-align: left; }
        .back-btn { margin-bottom: 20px; color: var(--link-blue); cursor: pointer; }
        #ai-summary { font-size: 18px; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓 Modo Oscuro/Claro</button>

<div class="container">
    <div id="home-view">
        <div class="wiki-header">
            <h1>LITEPEDIA</h1>
            <p>L’enciclopèdia lliure i resumida per IA</p>
        </div>

        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Buscar artículo...">
            <select id="source-lang-select"><option value="en">English</option><option value="es" selected>Español</option></select>
            <select id="output-lang-select"><option value="en">English</option><option value="es" selected>Español</option></select>
            <button onclick="executeSearch()">Search</button>
        </div>
    </div>

    <div id="reader-view">
        <div class="back-btn" onclick="goHome()">← Volver</div>
        <h1 id="article-title"></h1>
        <div id="ai-summary">Analizando...</div>
    </div>
</div>

<!-- Posicionamiento del Anuncio -->

    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
    // Lógica del Tema
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // Cargar preferencia al iniciar
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

</script>
</body>
</html>
